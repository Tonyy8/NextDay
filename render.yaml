services:
  - type: web
    name: nextday-app
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --chdir backend"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "True"
      - key: MOCK_MODE
        value: "True"
      - key: DB_ENGINE
        value: "sqlite"
